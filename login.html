<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhilRice HRIS - Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-brand">
            <img src="img/PhilRice-Logo.png" alt="PhilRice Logo">
            <h1>HRIS</h1>
            <p>HUMAN RESOURCES<br>INFORMATION SYSTEM</p>
        </div>

        <div class="login-form-section">
            <h2>Welcome Back</h2>
            <p class="login-subtitle">Sign in to access the HRIS dashboard</p>

            <div class="login-error" id="loginError">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>Invalid credentials. Please try again.</span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="login-footer">
                &copy; 2024 PhilRice HRIS. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            // Design-only: any input redirects to dashboard
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
