<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhilRice HRIS - Calendar</title>
    <link rel="stylesheet" href="booking.css">
    <link rel="stylesheet" href="calendar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="cos-page">
    <button class="mobile-menu-toggle" onclick="toggleSidebar()">
        <i class="fa-solid fa-bars"></i>
    </button>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <img src="img/PhilRice-Logo.png" alt="PhilRice Logo">
                <div class="logo-text">HRIS</div>
                <div class="logo-subtitle">HUMAN RESOURCES<br>INFORMATION SYSTEM</div>
            </div>
            <nav class="nav-menu">
                <div class="menu-section-header">Menu</div>
                <div class="nav-item">
                    <img class="icon-box" src="img/dashboard1.png">
                    <span><a href="index.html">Dashboard</a></span>
                </div>
                
                <div class="has-dropdown">
                    <div class="menu-header" onclick="toggleDropdown(this)">
                        <div class="icon-box">
                            <img src="img/cos1.png">
                        </div>
                            <span><a href="cos.html">COS</a></span>
                        <i class="fa-solid fa-chevron-down dropdown-icon"></i>
                    </div>
                    
                    <div class="submenu">
                        <div class="submenu-item">
                            <div class="icon-box">
                                <img src="img/filled1.png">
                            </div>
                            <span><a href="cos-filled.html">Filled</a></span>
                        </div>
                        <div class="submenu-item">
                            <div class="icon-box">
                                <img src="img/vacant2.png">
                            </div>
                            <span><a href="cos-vacant.html">Vacant</a></span>
                        </div>
                    </div>
                </div>
                <div class="nav-item">
                    <img class="icon-box" src="img/jo1.png">
                    <span><a href="jo.html">Job Order</a></span>
                </div>
                <div class="nav-item">
                    <img class="icon-box" src="img/ticket1.png">
                    <span><a href="booking.html">Booking</a></span>
                </div>
                <div class="nav-item active">
                    <img class="icon-box" src="img/calendar1.png">
                    <span><a href="calendar.html">Calendar</a></span>
                </div>
                <div class="nav-item">
                    <img class="icon-box" src="img/bell.png">
                    <span><a href="notifications.html">Notifications</a></span>
                </div>

                <div class="menu-section-header">Account</div>
                <div class="nav-item">
                    <img class="icon-box" src="img/user1.png">
                    <span><a href="user.html">Account</a></span>
                </div>
                <!-- <div class="nav-item">
                    <img class="icon-box" src="img/signout.png">
                    <span><a href="#">Sign Out</a></span>
                </div> -->
            </nav>
        </aside>

        <!-- Header -->
        <div class="page-header">
            <div class="header-content">
                <div class="breadcrumb">
                    <span class="header-text">HRIS</span>
                    <i class="fa-solid fa-chevron-right"></i>
                    <span class="header-text">Calendar</span>
                </div>
                <div class="header-actions">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Search..." id="calendar-search">
                    </div>
                </div>
            </div>
        </div>

        <main class="main-content">
            <div class="calendar-content">
                <div class="year-nav">
                    <button class="year-nav-btn" onclick="changeYear(-1)">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <h2 id="yearLabel"></h2>
                    <button class="year-nav-btn" onclick="changeYear(1)">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/dropdown.js"></script>
    <script src="js/calendar.js"></script>
</body>
</html>
